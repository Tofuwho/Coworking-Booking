<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Decorator — Coworking Booking</title>
  <meta name="description" content="Sims-like 3D room decorator for coworking spaces">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="top-bar">
    <a class="back-btn" id="back-btn" href="index.html" title="Back to floor plan">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg> Back
    </a>
    <h1 class="room-title" id="room-title">Room</h1>
    <div class="divider"></div>
    <div class="toolbar-group">
      <button class="icon-btn" id="undo-btn" disabled><svg viewBox="0 0 24 24"><path d="M3 10h10a5 5 0 0 1 0 10H9"/><path d="M7 14l-4-4 4-4"/></svg></button>
      <button class="icon-btn" id="redo-btn" disabled><svg viewBox="0 0 24 24"><path d="M21 10H11a5 5 0 0 0 0 10h4"/><path d="M17 14l4-4-4-4"/></svg></button>
    </div>
    <div class="divider"></div>
    <div class="toolbar-group">
      <button class="icon-btn" id="rotate-btn" disabled>
        <svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg> R
      </button>
      <button class="icon-btn danger" id="delete-btn" disabled>
        <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M5 6v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6"/></svg>
      </button>
    </div>
    <div class="divider"></div>
    <div class="toolbar-group">
      <button class="icon-btn" id="export-json-btn" title="Export Room Layout as JSON">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export
      </button>
      <button class="icon-btn" id="import-json-btn" title="Import Room Layout from JSON">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Import
      </button>
    </div>
    <div class="spacer"></div>
    <span class="status-text" id="status-text">Ready</span>
  </header>

  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-scroll" id="sidebar-scroll"></div>
    </aside>
    <div class="canvas-area" id="canvas-area">
      
      <!-- On-Canvas Room Resizer Controls -->
      <div class="canvas-resizer canvas-resizer-w">
        <span class="resizer-label">Width: <strong id="resizer-w-val">8</strong>m</span>
        <input type="range" id="canvas-size-w" min="4" max="16" value="8">
      </div>

      <div class="canvas-resizer canvas-resizer-d">
        <span class="resizer-label">Depth: <strong id="resizer-d-val">6</strong>m</span>
        <input type="range" id="canvas-size-d" min="4" max="16" value="6">
      </div>

      <!-- Floating Surface Color / Material Picker Popup -->
      <div class="surface-popover" id="surface-popover">
        <div class="popover-header">
          <span class="popover-title" id="surface-title">Customize Surface</span>
          <button class="close-popover" id="close-surface-btn">&times;</button>
        </div>
        <div class="swatch-row" id="surface-swatch-list"></div>
      </div>

      <div class="help-hint">
        <kbd>Click Wall/Floor</kbd> Material · <kbd>LMB Drag</kbd> Orbit Camera / Drag Furniture<br>
        <kbd>RMB Drag</kbd> Pan Camera · <kbd>RMB Click Item</kbd> Delete · <kbd>R</kbd> Rotate · <kbd>Scroll</kbd> Zoom
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Vite ES Module Main Entry -->
  <script type="module" src="/src/scripts/room-decorator.js"></script>
</body>
</html>
